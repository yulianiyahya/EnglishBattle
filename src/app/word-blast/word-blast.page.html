<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>💥 Word Blast</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="blast-content">

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-label">SKOR</span>
      <span class="stat-value">{{ score }}</span>
    </div>
    <div class="stat-item timer" [class.danger]="timeLeft <= 5">
      <span class="stat-label">WAKTU</span>
      <span class="stat-value">{{ timeLeft }}s</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">STREAK</span>
      <span class="stat-value">🔥 {{ streak }}</span>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <ion-progress-bar [value]="progress" color="warning"></ion-progress-bar>
    <p class="progress-text">{{ currentIndex + 1 }} / {{ words.length }}</p>
  </div>

  <!-- Word Info Card -->
  <div class="word-card" *ngIf="!gameOver && currentWord">
    <p class="hint-label">HINT</p>
    <p class="hint-text">{{ currentWord.hint }}</p>
    <p class="translation">Artinya: <strong>{{ currentWord.translation }}</strong></p>
  </div>

  <!-- Answer Display -->
  <div class="answer-display" *ngIf="!gameOver && currentWord">
    <div class="answer-slots">
      <div
        class="answer-slot"
        *ngFor="let i of currentWord.word.split('')">
        {{ selectedLetters[currentWord.word.indexOf(i)] || '_' }}
      </div>
    </div>
    <div class="answer-letters">
      <span *ngFor="let l of selectedLetters" class="chosen-letter">{{ l }}</span>
    </div>
  </div>

  <!-- Shuffled Letters -->
  <div class="letters-grid" *ngIf="!gameOver && currentWord">
    <button
      class="letter-btn"
      *ngFor="let letter of shuffledLetters; let i = index"
      [class.used]="isSelected(i)"
      (click)="selectLetter(letter, i)"
      [disabled]="isSelected(i)">
      {{ letter }}
    </button>
  </div>

  <!-- Action Buttons -->
  <div class="action-btns" *ngIf="!gameOver">
    <ion-button fill="outline" color="warning" (click)="removeLast()">
      <ion-icon name="backspace-outline" slot="start"></ion-icon>
      Hapus
    </ion-button>
    <ion-button fill="outline" color="danger" (click)="handleWrong()">
      <ion-icon name="skip-forward-outline" slot="start"></ion-icon>
      Skip
    </ion-button>
  </div>

</ion-content>
